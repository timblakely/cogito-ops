apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
spec:
  interval: 30m
  chart:
    spec:
      chart: nvidia-device-plugin
      version: "0.18.0"
      sourceRef:
        kind: HelmRepository
        name: nvdp
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    runtimeClassName: nvidia
    gfd:
      enabled: true
    config:
      name: nvidia-plugin-configs
      default: config.yaml
