---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certificates-import
  labels:
    uses-shared-cluster-secrets: true
spec:
  interval: 1h
  path: ./kubernetes/apps/network/certificates/import
  prune: true
  dependsOn: []
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-settings
        optional: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: true
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certificates-export
  labels:
    uses-shared-cluster-secrets: true
spec:
  dependsOn:
    - name: certificates-import
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-settings
        optional: false
  interval: 1h
  path: ./kubernetes/apps/network/certificates/export
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false
