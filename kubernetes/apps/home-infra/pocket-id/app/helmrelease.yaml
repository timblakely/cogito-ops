---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id-operator
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: pocket-id-operator
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    instance:
      name: pocket-id
      spec:
        image: ghcr.io/pocket-id/pocket-id:v2.2.0
        encryptionKey:
          valueFrom:
            secretKeyRef:
              name: pocket-id
              key: ENCRYPTION_KEY
        databaseUrl:
          valueFrom:
            secretKeyRef:
              name: pocket-id-db-app
              key: uri
        appUrl: https://pid.${DOMAIN_NAME}
        hostUsers: false
      persistence:
        enabled: false
      route:
        enabled: true
        host: pid.${DOMAIN_NAME}
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: envoy-external
            namespace: envoy-system
            sectionName: https
    users:
      - name: tim
        spec:
          admin: true
          email: 
            value: ${EMAIL}
          firstName: 
            value: Tim
          lastName: 
            value: Blakely
      - name: timtest
        spec:
          admin: true
          email: 
            value: foo.bar@gmail.com
          firstName: 
            value: Tim
          lastName: 
            value: Test
