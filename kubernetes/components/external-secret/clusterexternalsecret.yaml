---
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ${APP}
  labels:
    autoreiv.io/component: external-secret
spec:
  externalSecretMetadata:
    labels:
      autoreiv.io/component: external-secret
  namespaceSelectors:
    - matchLabels:
        kubernetes.io/metadata.name: ${NS}
  refreshTime: "1m"
  externalSecretSpec:
    secretStoreRef:
      kind: ClusterSecretStore
      name: onepassword
    data: []
    dataFrom:
      - extract:
          key: ${APP}
