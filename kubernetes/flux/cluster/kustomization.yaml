---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./cilium.yaml
  - ./cluster-infra.yaml
  - ./database.yaml
  - ./envoy-system.yaml
  - ./flux-system.yaml
  - ./home-infra.yaml
  - ./kube-system.yaml
  - ./network.yaml
  - ./observability.yaml
  - ./rook-ceph.yaml
  - ./storage.yaml
  - ./tools.yaml
patches:
  - patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: patch
      spec:
        dependsOn:
          - name: flux-meta
        postBuild:
          substituteFrom:
            - kind: Secret
              name: cluster-settings
    target:
      kind: Kustomization
      group: kustomize.toolkit.fluxcd.io
